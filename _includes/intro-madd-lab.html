<!-- SECTION 3: Lab Information -->
<section id="lab-info" class="lab-info-section">
    {% if site.lab %}
    <h2><a href="{{ site.lab.website }}" target="_blank">{{ site.lab.name }}</a></h2>

    <div class="lab-details">
        <p class="lab-header"><span class="gold">Harvey Mudd College</span></p>
        <p>{{ site.lab.description }}</p>
    </div>
    {% else %}
    <p>No lab information available.</p>
    {% endif %}
</section>
